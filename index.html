<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- Meta Tags untuk PWA (Native App Feel) & Safe Area iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#111827">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Sertifikasi QL">
    <meta name="description" content="Sistem Sertifikasi Al-Qur'an SDIT Arkan Cendekia - Platform digital untuk pendaftaran, penilaian hafalan, dan laporan sertifikasi siswa.">

    <!-- Link ke Manifest dan Icon PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>Sertifikasi Al-Qur'an - SDIT Arkan Cendekia</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }

        /* Print Styles */
        @media print {
            body { background-color: white; }
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .print-container { padding: 0; margin: 0; width: 100%; max-width: none !important; }
            table { border-collapse: collapse; width: 100%; }
            th, td { border: 1px solid black !important; padding: 8px; text-align: left; font-size: 12px; }
            th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; }

            /* Paksa Landscape untuk Haflah */
            @page { size: landscape; margin: 1cm; }
            .landscape-print { width: 100%; }
        }
        .print-only { display: none; }

        /* Custom Scrollbar for Desktop - Elegant Theme */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

        /* Hide scrollbar on mobile cards area for cleaner look */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* PWA Safe Area for iOS Notch */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="text-gray-800 selection:bg-gray-900 selection:text-white relative">

    <div id="app"></div>

    <!-- ============================================================ -->
    <!-- URUTAN LOAD SCRIPT SANGAT PENTING! Jangan diubah urutannya.  -->
    <!-- ============================================================ -->

    <!-- 1. State & Konfigurasi Global -->
    <script src="js/state.js"></script>

    <!-- 2. Komponen UI (Toast, Dialog, Navbar) -->
    <script src="js/ui.js"></script>

    <!-- 3. Database & API Supabase -->
    <script src="js/api.js"></script>

    <!-- 4. Halaman-Halaman (Pages) -->
    <script src="js/pages/login.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/pendaftaran.js"></script>
    <script src="js/pages/penilaian.js"></script>
    <script src="js/pages/laporan.js"></script>
    <script src="js/pages/haflah.js"></script>
    <script src="js/pages/profil.js"></script>

    <!-- 5. App Router & Inisialisasi (harus paling akhir) -->
    <script src="js/app.js"></script>

</body>
</html>
